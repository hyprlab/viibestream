services:
  viibestream:
    build: .
    image: viibestream:latest
    container_name: viibestream
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
    ports:
      # Container listens on :8000 in plain mode and :8443 when
      # TLS_ENABLE=1. The right-hand side matches whichever is active;
      # PORT controls the host-side binding.
      # For the reverse-proxy case, point your proxy at this host:port.
      - "0.0.0.0:${PORT:-8000}:${INTERNAL_PORT:-8000}"
    volumes:
      - viibestream_data:/app/instance
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

volumes:
  viibestream_data:
