[pytest]
testpaths = tests
python_files = test_*.py
addopts = -ra --strict-markers
# pytest-playwright: default to headless Chromium. Override on the CLI:
#   pytest --headed --browser firefox
# Point at a different deployment with:
#   BASE_URL=http://10.0.1.14:8080 pytest
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    stream: tests that exercise live broadcasting (needs fake-media flags)
